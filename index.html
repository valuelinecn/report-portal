<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>价值投资研究报告 · 企业门户</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue','Noto Sans SC',sans-serif;background:#080816;color:#e0e0e0;min-height:100vh}

/* ===== HEADER ===== */
header{background:linear-gradient(135deg,#0a0a2e 0%,#12122a 50%,#080816 100%);padding:20px 16px 16px;text-align:center;border-bottom:1px solid #1a1a3a;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-40%;left:-20%;width:140%;height:140%;background:radial-gradient(ellipse at 30% 50%,rgba(240,192,64,0.06) 0%,transparent 70%);pointer-events:none}
.hero-icon{font-size:30px;margin-bottom:4px}
h1{font-size:20px;color:#fff;font-weight:700;letter-spacing:1px}
h1 span{color:#f0c040}
.subtitle{font-size:11px;color:#555;margin-top:2px;letter-spacing:2px}

/* ===== NAV TABS ===== */
.tab-bar{display:flex;background:#0a0a1a;border-bottom:1px solid #1a1a3a;position:sticky;top:0;z-index:50;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:0;padding:12px 6px;text-align:center;font-size:12px;color:#555;background:none;border:none;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500;font-family:inherit}
.tab-btn.active{color:#f0c040;border-bottom-color:#f0c040}
.tab-btn:active{background:rgba(240,192,64,0.04)}

/* ===== TAB CONTENT ===== */
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== STATS BAR ===== */
.stats-bar{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:10px;color:#555}
.stats-bar span{color:#888}

/* ===== SEARCH BAR ===== */
.search-wrap{padding:12px 16px 0;max-width:720px;margin:0 auto}
.search-box{display:flex;align-items:center;background:#0e0e22;border:1px solid #1e1e3a;border-radius:10px;padding:3px 12px;transition:all 0.25s ease}
.search-box:focus-within{border-color:#f0c04055;box-shadow:0 0 0 3px rgba(240,192,64,0.06)}
.search-box svg{flex-shrink:0;width:16px;height:16px;fill:none;stroke:#555;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-input{flex:1;background:none;border:none;outline:none;color:#ddd;font-size:13px;padding:8px 8px;font-family:inherit}
.search-input::placeholder{color:#444}
.search-clear{background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:3px 5px;display:none;line-height:1}
.search-clear.visible{display:block}
.search-clear:active{color:#888}
.search-hint{font-size:10px;color:#333;margin-top:4px;padding:0 4px}
.search-hint kbd{background:#1a1a3a;color:#555;padding:1px 5px;border-radius:3px;font-size:9px;font-family:inherit}

/* ===== CATALOG ===== */
.catalog{padding:12px 16px;max-width:720px;margin:0 auto}
.catalog h2{font-size:13px;color:#777;margin:6px 0 12px 4px;font-weight:400;letter-spacing:1px}
.card-grid{display:flex;flex-direction:column;gap:12px}
.card{background:linear-gradient(135deg,#12122a 0%,#0e0e22 100%);border-radius:12px;padding:16px;border:1px solid #1e1e3a;cursor:pointer;transition:all 0.25s ease;position:relative;overflow:hidden}
.card:active{transform:scale(0.98);border-color:#f0c04044}
.card::after{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:50%;opacity:0.04;pointer-events:none}
.card-row{display:flex;align-items:flex-start;gap:12px}
.card-score{flex-shrink:0;width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.card-score-ring{position:absolute;inset:0;border-radius:50%}
.card-score-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#0e0e22}
.card-score-num{font-size:16px;font-weight:bold;line-height:1}
.card-score-label{font-size:7px;opacity:0.6;line-height:1.2}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:1px}
.card-name-en{font-size:9px;color:#444;margin-bottom:3px}
.card-desc{font-size:10px;color:#666;margin-bottom:5px;line-height:1.4}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.tag{font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.06);color:#777;border:1px solid rgba(255,255,255,0.06)}
.card-metrics{display:flex;flex-wrap:wrap;gap:2px 10px;font-size:9px;color:#555}
.card-metrics span{color:#888}
.card-author{font-size:10px;color:#888;margin-bottom:3px}

/* ===== DETAIL VIEW ===== */
.detail-view{display:none;position:fixed;inset:0;z-index:100;background:#080816;flex-direction:column}
.detail-view.active{display:flex}
.detail-toolbar{display:flex;align-items:center;padding:10px 16px;background:#0a0a1a;border-bottom:1px solid #1a1a3a;gap:10px;flex-shrink:0}
.back-btn{background:none;border:1px solid #333;color:#ccc;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.back-btn:active{background:#1a1a3a}
.detail-title-bar{font-size:12px;color:#777;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-title-bar span{color:#fff}
.detail-scroll{flex:1;overflow-y:auto;padding:16px;max-width:720px;margin:0 auto;width:100%}

/* ===== DETAIL SECTIONS ===== */
.detail-section{background:linear-gradient(135deg,#12122a 0%,#0e0e22 100%);border-radius:12px;padding:16px;border:1px solid #1e1e3a;margin-bottom:14px}
.detail-section h3{font-size:14px;color:#f0c040;margin-bottom:10px;font-weight:600}
.detail-section p{font-size:12px;color:#bbb;line-height:1.7}
.detail-hero{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.detail-emoji{font-size:40px}
.detail-meta{font-size:11px;color:#666;margin-top:4px}
.detail-meta span{color:#999}

/* Architecture items */
.arch-item{border:1px solid #1e1e3a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.arch-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:rgba(255,255,255,0.02);transition:background 0.2s}
.arch-header:active{background:rgba(255,255,255,0.04)}
.arch-title{font-size:12px;color:#ddd;font-weight:500}
.arch-toggle{font-size:10px;color:#555;transition:transform 0.2s;flex-shrink:0;margin-left:10px}
.arch-toggle.open{transform:rotate(180deg)}
.arch-body{display:none;padding:0 14px 14px}
.arch-body.open{display:block}
.arch-chapters{list-style:none;margin:8px 0}
.arch-chapters li{font-size:11px;color:#888;padding:3px 0 3px 14px;position:relative}
.arch-chapters li::before{content:'▸';position:absolute;left:0;color:#444}
.arch-summary{font-size:11px;color:#aaa;line-height:1.6;margin-top:6px;padding:10px;background:rgba(255,255,255,0.03);border-radius:6px}

/* Quotes */
.quote-grid{display:flex;flex-direction:column;gap:8px}
.quote-item{background:rgba(240,192,64,0.04);border-left:2px solid #f0c04040;padding:10px 12px;border-radius:0 6px 6px 0}
.quote-text{font-size:12px;color:#ddd;line-height:1.6;font-style:italic}
.quote-text::before{content:'"';color:#f0c04055}
.quote-text::after{content:'"';color:#f0c04055}
.quote-context{font-size:10px;color:#555;margin-top:4px}

/* Summary */
.summary-card{background:linear-gradient(135deg,#f0c04008,#0e0e22 80%);border:1px solid #f0c04020;border-radius:12px;padding:16px}
.summary-card h3{color:#f0c040;font-size:14px;margin-bottom:8px}
.summary-card p{font-size:12px;color:#ccc;line-height:1.7}

/* Books index */
.books-subtitle{font-size:10px;color:#555;margin:6px 0 12px 4px}

/* ===== RESPONSIVE ===== */
@media(min-width:600px){
  header{padding:28px 24px 20px}
  h1{font-size:26px}
  .card-grid{gap:14px}
  .card{padding:20px}
  .card-name{font-size:17px}
  .tab-btn{font-size:14px;padding:14px 16px}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e1e3a;border-radius:2px}

/* ===== LOADING ===== */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:12px;flex-direction:column;gap:8px}
.spinner{width:24px;height:24px;border:2px solid #1e1e3a;border-top-color:#f0c040;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Games placeholder */
.games-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.games-placeholder .icon{font-size:60px;margin-bottom:16px}
.games-placeholder h2{font-size:18px;color:#fff;margin-bottom:8px}
.games-placeholder p{font-size:12px;color:#555;max-width:300px;line-height:1.6}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="hero-icon">📊</div>
  <h1>价值投资 <span>研究门户</span></h1>
  <div class="subtitle">VALUE INVESTING RESEARCH PORTAL</div>
</header>

<!-- ===== NAV TABS ===== -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="reports" onclick="switchTab('reports')">📊 研究报告</button>
  <button class="tab-btn" data-tab="books" onclick="switchTab('books')">📚 价值投资书籍</button>
  <button class="tab-btn" data-tab="games" onclick="switchTab('games')">🎮 投资游戏</button>
</div>

<!-- ===== TAB: REPORTS ===== -->
<div class="tab-content active" id="tab-reports">
  <div class="stats-bar">
    报告 · <span id="totalReports">0</span> 篇 &nbsp;|&nbsp; 数据 · 恒生聚源数据库
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="搜索企业名称、行业、标签、指标…" oninput="onSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-hint"><kbd>Ctrl+K</kbd> 快速搜索 · 支持中文/英文</div>
  </div>
  <div class="catalog" id="catalog">
    <div id="catalogHeader"><h2>📂 企业研究报告</h2></div>
    <div class="card-grid" id="cardGrid"></div>
    <div id="noResults" style="display:none;text-align:center;padding:40px 16px">
      <div style="font-size:36px;margin-bottom:10px">🔍</div>
      <div style="color:#555;font-size:13px">没有找到匹配的报告</div>
      <div style="color:#333;font-size:11px;margin-top:4px">试试其他关键词？</div>
    </div>
  </div>
</div>

<!-- ===== TAB: BOOKS ===== -->
<div class="tab-content" id="tab-books">
  <div class="stats-bar">
    书籍 · <span id="totalBooks">0</span> 本 &nbsp;|&nbsp; 价值投资经典
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="bookSearch" type="text" placeholder="搜索书名、作者、金句…" oninput="onBookSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="bookSearchClear" onclick="clearBookSearch()">✕</button>
    </div>
    <div class="search-hint">搜索书名、作者名或关键词</div>
  </div>
  <div class="catalog">
    <h2>📚 价值投资经典书库</h2>
    <div class="books-subtitle" id="booksSubtitle"></div>
    <div class="card-grid" id="bookGrid"></div>
    <div id="bookNoResults" style="display:none;text-align:center;padding:40px 16px">
      <div style="font-size:36px;margin-bottom:10px">📚</div>
      <div style="color:#555;font-size:13px">没有找到匹配的书籍</div>
      <div style="color:#333;font-size:11px;margin-top:4px">试试其他关键词？</div>
    </div>
  </div>
</div>

<!-- ===== TAB: GAMES ===== -->
<div class="tab-content" id="tab-games">
  <div class="games-placeholder">
    <div class="icon">🎮</div>
    <h2>投资游戏 · 即将上线</h2>
    <p>趣味投资知识挑战即将到来，帮助您在游戏中巩固价值投资理念。</p>
  </div>
</div>

<!-- ===== REPORT VIEW (fullscreen) ===== -->
<div class="detail-view" id="reportView">
  <div class="detail-toolbar">
    <button class="back-btn" onclick="closeReport()">← 返回目录</button>
    <div class="detail-title-bar"><span id="reportTitle">报告</span></div>
  </div>
  <div class="detail-scroll" style="display:none;padding:0">
    <div class="loading" id="reportLoading">
      <div class="spinner"></div>
      <span>加载报告中…</span>
    </div>
    <iframe class="" id="reportFrame" style="width:100%;height:100%;border:none;display:none" onload="onFrameLoaded()"></iframe>
  </div>
</div>

<!-- ===== BOOK DETAIL VIEW (fullscreen) ===== -->
<div class="detail-view" id="bookDetailView">
  <div class="detail-toolbar">
    <button class="back-btn" onclick="closeBookDetail()">← 返回书库</button>
    <div class="detail-title-bar"><span id="bookDetailTitle">书籍详情</span></div>
  </div>
  <div class="detail-scroll" id="bookDetailContent">
    <div class="loading"><div class="spinner"></div><span>加载中…</span></div>
  </div>
</div>

<script src="books-data.js"></script>
<script>
// ===== COMPANIES DATA =====
const COMPANIES = [
  {
    id: 'maotai', name: '贵州茅台', nameEn: 'Kweichow Moutai', score: 7.0, scoreMax: 10,
    color: '#f0c040', industry: '食品饮料 · 白酒',
    desc: '中国高端白酒行业绝对龙头，A股最具代表性的消费类核心资产。',
    tags: ['核心资产', '国酒', '高毛利'],
    metrics: {营收: '1,899亿', 净利: '910亿', 毛利率: '91%+', PE: '20.7x', ROE: '28%', 股息率: '3.2%'},
    file: 'maotai.html'
  },
  {
    id: 'zhongjixuchuang', name: '中际旭创', nameEn: 'Zhongji Innolight', score: 7.5, scoreMax: 10,
    color: '#4fc3f7', industry: '通信 · 光模块',
    desc: '全球光模块行业龙头，AI算力基础设施核心受益者。',
    tags: ['AI算力', '光模块', '出海'],
    metrics: {营收: '258亿', 净利: '58.7亿', 毛利率: '35.8%', PE: '21.5x', ROE: '25%', 净利率: '22.7%'},
    file: 'zhongjixuchuang.html'
  }
]

// ===== TAB SWITCHING =====
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'))
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'))
  document.getElementById('tab-' + name).classList.add('active')
  document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active')
}

// ===== REPORT CATALOG =====
let searchQuery = ''

document.addEventListener('DOMContentLoaded', () => {
  renderCatalog()
  renderBooks()
})

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('reportView').classList.contains('active')) closeReport()
    else if (document.getElementById('bookDetailView').classList.contains('active')) closeBookDetail()
    else if (searchQuery) clearSearch()
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault()
    document.getElementById('searchInput').focus()
  }
})

// ===== REPORTS =====
function renderCatalog(query) {
  query = (query || '').toLowerCase().trim()
  const grid = document.getElementById('cardGrid')
  const noRes = document.getElementById('noResults')
  const hdr = document.getElementById('catalogHeader')

  const filtered = query
    ? COMPANIES.filter(c => {
        const searchText = [c.name, c.nameEn, c.industry, c.desc, ...c.tags,
          ...Object.entries(c.metrics).map(([k,v]) => k + ' ' + v)
        ].join(' ').toLowerCase()
        return searchText.includes(query)
      })
    : COMPANIES

  document.getElementById('totalReports').textContent = COMPANIES.length

  grid.innerHTML = filtered.map(c => {
    const pct = (c.score / c.scoreMax * 100).toFixed(0)
    const deg = (pct / 100 * 360).toFixed(0)
    const metKeys = Object.keys(c.metrics)
    const metHTML = metKeys.map(k => `<span>${k}: ${c.metrics[k]}</span>`).join('')
    const tagsHTML = c.tags.map(t =>
      `<span class="tag" style="background:${c.color}15;color:${c.color};border-color:${c.color}20">${t}</span>`
    ).join('')

    return `<div class="card" onclick="openReport('${c.id}')">
      <div class="card-row">
        <div class="card-score">
          <svg class="card-score-ring" viewBox="0 0 36 36">
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#1e1e3a" stroke-width="3"/>
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="${c.color}" stroke-width="3" stroke-dasharray="${deg}, 360" stroke-linecap="round"/>
          </svg>
          <div class="card-score-inner">
            <div class="card-score-num" style="color:${c.color}">${c.score}</div>
            <div class="card-score-label">/${c.scoreMax}</div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-name">${c.name}</div>
          <div class="card-name-en">${c.nameEn}</div>
          <div class="card-desc">${c.industry}</div>
          <div class="card-tags">${tagsHTML}</div>
          <div class="card-metrics">${metHTML}</div>
        </div>
      </div>
    </div>`
  }).join('')

  noRes.style.display = filtered.length === 0 ? 'block' : 'none'
  hdr.innerHTML = query
    ? `<h2>📂 搜索结果 · 共 <span style="color:#f0c040">${filtered.length}</span> 篇匹配</h2>`
    : `<h2>📂 企业研究报告 · 共 <span style="color:#888">${COMPANIES.length}</span> 篇</h2>`
}

function onSearch(val) {
  searchQuery = val
  document.getElementById('searchClear').classList.toggle('visible', val.length > 0)
  renderCatalog(val)
}

function clearSearch() {
  document.getElementById('searchInput').value = ''
  document.getElementById('searchClear').classList.remove('visible')
  onSearch('')
}

function openReport(id) {
  const c = COMPANIES.find(x => x.id === id)
  if (!c) return
  document.getElementById('reportTitle').innerHTML = `<span>${c.name}</span> · ${c.industry}`
  document.getElementById('reportView').classList.add('active')
  document.getElementById('reportLoading').style.display = 'flex'
  document.getElementById('reportFrame').style.display = 'none'
  document.getElementById('reportFrame').src = 'reports/' + c.file
}

function closeReport() {
  document.getElementById('reportView').classList.remove('active')
  document.getElementById('reportFrame').src = ''
}

function onFrameLoaded() {
  document.getElementById('reportLoading').style.display = 'none'
  document.getElementById('reportFrame').style.display = 'block'
}

// ===== BOOKS =====
let bookSearchQuery = ''

function renderBooks(query) {
  query = (query || '').toLowerCase().trim()
  const grid = document.getElementById('bookGrid')
  const noRes = document.getElementById('bookNoResults')
  const sub = document.getElementById('booksSubtitle')

  const filtered = query
    ? BOOKS.filter(b => {
        const searchText = [b.title, b.titleEn, b.author, b.authorEn, ...b.tags,
          ...b.quotes.map(q => q.text)
        ].join(' ').toLowerCase()
        return searchText.includes(query)
      })
    : BOOKS

  document.getElementById('totalBooks').textContent = BOOKS.length

  grid.innerHTML = filtered.map(b => {
    const stars = '★'.repeat(b.rating) + '☆'.repeat(5 - b.rating)
    const tagsHTML = b.tags.map(t =>
      `<span class="tag" style="background:${b.color}15;color:${b.color};border-color:${b.color}20">${t}</span>`
    ).join('')

    return `<div class="card" onclick="openBook('${b.id}')">
      <div class="card-row">
        <div style="font-size:36px;flex-shrink:0;width:48px;text-align:center">${b.coverEmoji}</div>
        <div class="card-info">
          <div class="card-name">${b.title}</div>
          <div class="card-name-en">${b.titleEn}</div>
          <div class="card-author" style="color:${b.color}">${b.author} · ${b.year}</div>
          <div style="font-size:10px;color:${b.color};letter-spacing:1px;margin-bottom:4px">${stars}</div>
          <div class="card-tags">${tagsHTML}</div>
          <div class="card-desc">${b.intro.slice(0, 80)}…</div>
        </div>
      </div>
    </div>`
  }).join('')

  noRes.style.display = filtered.length === 0 ? 'block' : 'none'
  sub.textContent = query
    ? `搜索 · ${filtered.length} 本匹配`
    : `${BOOKS.length} 本经典 · 从基础到进阶`
}

function onBookSearch(val) {
  bookSearchQuery = val
  document.getElementById('bookSearchClear').classList.toggle('visible', val.length > 0)
  renderBooks(val)
}

function clearBookSearch() {
  document.getElementById('bookSearch').value = ''
  document.getElementById('bookSearchClear').classList.remove('visible')
  onBookSearch('')
}

function openBook(id) {
  const b = BOOKS.find(x => x.id === id)
  if (!b) return
  document.getElementById('bookDetailTitle').innerHTML = `<span>${b.title}</span> · ${b.author}`
  document.getElementById('bookDetailView').classList.add('active')

  const stars = '★'.repeat(b.rating) + '☆'.repeat(5 - b.rating)
  const tagsHTML = b.tags.map(t =>
    `<span class="tag" style="background:${b.color}15;color:${b.color};border-color:${b.color}20">${t}</span>`
  ).join('')

  // Architecture
  const archHTML = b.architecture.map((a, i) => `
    <div class="arch-item">
      <div class="arch-header" onclick="toggleArch(${i})">
        <span class="arch-title">${a.title}</span>
        <span class="arch-toggle" id="archToggle${i}">▼</span>
      </div>
      <div class="arch-body" id="archBody${i}">
        <ul class="arch-chapters">${a.chapters.map(c => `<li>${c}</li>`).join('')}</ul>
        <div class="arch-summary">${a.summary}</div>
      </div>
    </div>
  `).join('')

  // Quotes
  const quotesHTML = b.quotes.map(q => `
    <div class="quote-item">
      <div class="quote-text">${q.text}</div>
      <div class="quote-context">— ${q.context}</div>
    </div>
  `).join('')

  const html = `
    <div class="detail-section">
      <div class="detail-hero">
        <div class="detail-emoji">${b.coverEmoji}</div>
        <div>
          <h3 style="font-size:18px;margin-bottom:2px">${b.title}</h3>
          <div style="font-size:12px;color:#777;margin-bottom:2px">${b.titleEn}</div>
          <div style="font-size:12px;color:${b.color}">${b.author} · ${b.year}</div>
          <div style="font-size:11px;color:${b.color};letter-spacing:1px;margin:4px 0">${stars}</div>
          <div class="card-tags">${tagsHTML}</div>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <h3>📖 书籍简介</h3>
      <p>${b.intro}</p>
    </div>

    <div class="detail-section">
      <h3>🏗️ 全书架构</h3>
      ${archHTML}
    </div>

    <div class="detail-section">
      <h3>💬 经典金句 · ${b.quotes.length} 条</h3>
      <div class="quote-grid">${quotesHTML}</div>
    </div>

    <div class="summary-card">
      <h3>📝 全书总结</h3>
      <p>${b.summary}</p>
    </div>
    <div style="height:20px"></div>
  `

  document.getElementById('bookDetailContent').innerHTML = html
}

function closeBookDetail() {
  document.getElementById('bookDetailView').classList.remove('active')
  document.getElementById('bookDetailContent').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>加载中…</span></div>'
}

function toggleArch(i) {
  const body = document.getElementById('archBody' + i)
  const toggle = document.getElementById('archToggle' + i)
  body.classList.toggle('open')
  toggle.classList.toggle('open')
}
</script>
</body>
</html>
