<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>价值投资研究报告 · 企业门户</title>
<style>
/* ===== THEME VARIABLES ===== */
:root{
  /* Dark (default) */
  --bg:#080816;--bg2:#0e0e22;--bg3:#12122a;--bg4:#0a0a1a;--bg5:#1a1a3a;
  --hdr:#0a0a2e;--hdr2:#12122a;
  --t1:#fff;--t2:#e0e0e0;--t3:#ddd;--t4:#ccc;--t5:#bbb;
  --m1:#999;--m2:#888;--m3:#777;--m4:#666;--m5:#555;--m6:#444;
  --b1:#1e1e3a;--b2:#1a1a3a;--b3:#333;
  --accent:#f0c040;--accent2:#f0c04055;--accent3:#f0c04015;--accent4:#f0c04040;
  --card:linear-gradient(135deg,#12122a 0%,#0e0e22 100%);
  --glow:radial-gradient(ellipse at 30% 50%,rgba(240,192,64,0.06) 0%,transparent 70%);
  --tag-bg:rgba(255,255,255,0.06);--tag-bd:rgba(255,255,255,0.06);
  --kb-bg:#1a1a3a;
}
[data-theme="light"]{
  --bg:#f4f1ea;--bg2:#ffffff;--bg3:#fcfcfa;--bg4:#fafaf7;--bg5:#e8e5dc;
  --hdr:#ffffff;--hdr2:#f4f1ea;
  --t1:#1a1a1a;--t2:#2d2d2d;--t3:#3d3d3d;--t4:#505050;--t5:#606060;
  --m1:#707070;--m2:#808080;--m3:#8a8a8a;--m4:#909090;--m5:#a0a0a0;--m6:#b8b8b8;
  --b1:#d8d4c8;--b2:#ccc8bc;--b3:#b8b4a8;
  --accent:#b8860b;--accent2:#b8860b55;--accent3:#b8860b14;--accent4:#b8860b33;
  --card:linear-gradient(135deg,#ffffff 0%,#f8f7f2 100%);
  --glow:none;
  --tag-bg:rgba(0,0,0,0.04);--tag-bd:rgba(0,0,0,0.08);
  --kb-bg:#e0ddd4;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue','Noto Sans SC',sans-serif;background:var(--bg);color:var(--t2);min-height:100vh;transition:background .3s,color .3s}

/* ===== HEADER ===== */
header{background:linear-gradient(135deg,var(--hdr) 0%,var(--hdr2) 50%,var(--bg) 100%);padding:20px 16px 16px;text-align:center;border-bottom:1px solid var(--b2);position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-40%;left:-20%;width:140%;height:140%;background:var(--glow);pointer-events:none}
.hdr-row{display:flex;align-items:center;justify-content:center;gap:12px}
.hero-icon{font-size:30px;margin-bottom:4px}
h1{font-size:20px;color:var(--t1);font-weight:700;letter-spacing:1px}
h1 span{color:var(--accent)}
.subtitle{font-size:11px;color:var(--m5);margin-top:2px;letter-spacing:2px}
.theme-toggle{background:none;border:1px solid var(--b3);color:var(--m2);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all .2s;line-height:1}
.theme-toggle:active{background:var(--bg5);transform:scale(.95)}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

/* ===== NAV TABS ===== */
.tab-bar{display:flex;background:var(--bg4);border-bottom:1px solid var(--b2);position:sticky;top:0;z-index:50;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:0;padding:12px 6px;text-align:center;font-size:12px;color:var(--m5);background:none;border:none;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500;font-family:inherit}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:active{background:var(--accent3)}

/* ===== TAB CONTENT ===== */
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== STATS BAR ===== */
.stats-bar{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:10px;color:var(--m5)}
.stats-bar span{color:var(--m2)}

/* ===== SEARCH BAR ===== */
.search-wrap{padding:12px 16px 0;max-width:720px;margin:0 auto}
.search-box{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--b1);border-radius:10px;padding:3px 12px;transition:all .25s ease}
.search-box:focus-within{border-color:var(--accent2);box-shadow:0 0 0 3px var(--accent3)}
.search-box svg{flex-shrink:0;width:16px;height:16px;fill:none;stroke:var(--m5);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--t3);font-size:13px;padding:8px 8px;font-family:inherit}
.search-input::placeholder{color:var(--m6)}
.search-clear{background:none;border:none;color:var(--m5);font-size:16px;cursor:pointer;padding:3px 5px;display:none;line-height:1}
.search-clear.visible{display:block}
.search-clear:active{color:var(--m2)}
.search-hint{font-size:10px;color:var(--m6);margin-top:4px;padding:0 4px}
.search-hint kbd{background:var(--kb-bg);color:var(--m5);padding:1px 5px;border-radius:3px;font-size:9px;font-family:inherit}

/* ===== CATALOG ===== */
.catalog{padding:12px 16px;max-width:720px;margin:0 auto}
.catalog h2{font-size:13px;color:var(--m3);margin:6px 0 12px 4px;font-weight:400;letter-spacing:1px}
.card-grid{display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--b1);cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.card:active{transform:scale(.98);border-color:var(--accent2)}
.card::after{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:50%;opacity:.04;pointer-events:none}
.card-row{display:flex;align-items:flex-start;gap:12px}
.card-score{flex-shrink:0;width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.card-score-ring{position:absolute;inset:0;border-radius:50%}
.card-score-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:var(--bg2)}
.card-score-num{font-size:16px;font-weight:bold;line-height:1}
.card-score-label{font-size:7px;opacity:.6;line-height:1.2}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:1px}
.card-name-en{font-size:9px;color:var(--m6);margin-bottom:3px}
.card-desc{font-size:10px;color:var(--m4);margin-bottom:5px;line-height:1.4}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.tag{font-size:8px;padding:2px 6px;border-radius:3px;background:var(--tag-bg);color:var(--m3);border:1px solid var(--tag-bd)}
.card-metrics{display:flex;flex-wrap:wrap;gap:2px 10px;font-size:9px;color:var(--m5)}
.card-metrics span{color:var(--m2)}
.card-author{font-size:10px;color:var(--m2);margin-bottom:3px}

/* ===== DETAIL VIEW ===== */
.detail-view{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column}
.detail-view.active{display:flex}
.detail-toolbar{display:flex;align-items:center;padding:10px 16px;background:var(--bg4);border-bottom:1px solid var(--b2);gap:10px;flex-shrink:0}
.back-btn{background:none;border:1px solid var(--b3);color:var(--t4);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.back-btn:active{background:var(--bg5)}
.detail-title-bar{font-size:12px;color:var(--m3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-title-bar span{color:var(--t1)}
.detail-scroll{flex:1;overflow-y:auto;padding:16px;max-width:720px;margin:0 auto;width:100%}

/* ===== DETAIL SECTIONS ===== */
.detail-section{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--b1);margin-bottom:14px}
.detail-section h3{font-size:14px;color:var(--accent);margin-bottom:10px;font-weight:600}
.detail-section p{font-size:12px;color:var(--t5);line-height:1.7}
.detail-hero{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.detail-emoji{font-size:40px}
.detail-meta{font-size:11px;color:var(--m4);margin-top:4px}
.detail-meta span{color:var(--m1)}

/* Architecture items */
.arch-item{border:1px solid var(--b1);border-radius:10px;margin-bottom:10px;overflow:hidden}
.arch-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:rgba(255,255,255,.02);transition:background .2s}
.arch-header:active{background:rgba(255,255,255,.04)}
.arch-title{font-size:12px;color:var(--t3);font-weight:500}
.arch-toggle{font-size:10px;color:var(--m5);transition:transform .2s;flex-shrink:0;margin-left:10px}
.arch-toggle.open{transform:rotate(180deg)}
.arch-body{display:none;padding:0 14px 14px}
.arch-body.open{display:block}
.arch-summary{font-size:11px;color:var(--t5);line-height:1.6;margin-top:6px;padding:10px;background:var(--bg5);border-radius:6px}

/* Chapter items (expandable) */
.chapter-item{border:1px solid var(--b2);border-radius:6px;margin-bottom:6px}
.chapter-header{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .2s}
.chapter-header:active{background:var(--accent3)}
.chapter-title{font-size:11px;color:var(--m2);flex:1}
.chapter-toggle{font-size:8px;color:var(--m6);flex-shrink:0;transition:transform .2s}
.chapter-toggle.open{transform:rotate(90deg)}
.chapter-body{display:none;padding:0 10px 10px 18px;font-size:11px;color:var(--t5);line-height:1.7;border-top:1px solid var(--b2)}
.chapter-body.open{display:block}
.chapter-body p{margin-bottom:6px}

/* Quotes */
.quote-grid{display:flex;flex-direction:column;gap:8px}
.quote-item{background:var(--accent3);border-left:2px solid var(--accent4);padding:10px 12px;border-radius:0 6px 6px 0}
.quote-text{font-size:12px;color:var(--t3);line-height:1.6;font-style:italic}
.quote-text::before{content:'"';color:var(--accent4)}
.quote-text::after{content:'"';color:var(--accent4)}
.quote-context{font-size:10px;color:var(--m5);margin-top:4px}

/* Summary */
.summary-card{background:linear-gradient(135deg,var(--accent4),var(--bg2) 80%);border:1px solid var(--accent2);border-radius:12px;padding:16px}
.summary-card h3{color:var(--accent);font-size:14px;margin-bottom:8px}
.summary-card p{font-size:12px;color:var(--t4);line-height:1.7}

/* ===== RESPONSIVE ===== */
@media(min-width:600px){
  header{padding:28px 24px 20px}
  h1{font-size:26px}
  .card-grid{gap:14px}
  .card{padding:20px}
  .card-name{font-size:17px}
  .tab-btn{font-size:14px;padding:14px 16px}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}

/* ===== LOADING ===== */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--m5);font-size:12px;flex-direction:column;gap:8px}
.spinner{width:24px;height:24px;border:2px solid var(--b1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Games placeholder */
.games-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.games-placeholder .icon{font-size:60px;margin-bottom:16px}
.games-placeholder h2{font-size:18px;color:var(--t1);margin-bottom:8px}
.games-placeholder p{font-size:12px;color:var(--m5);max-width:300px;line-height:1.6}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="hdr-row">
    <div class="hero-icon">📊</div>
    <h1>价值投资 <span>研究门户</span></h1>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌙</button>
  </div>
  <div class="subtitle">VALUE INVESTING RESEARCH PORTAL</div>
</header>

<!-- ===== NAV TABS ===== -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="reports" onclick="switchTab('reports')">📊 研究报告</button>
  <button class="tab-btn" data-tab="books" onclick="switchTab('books')">📚 价值投资书籍</button>
  <button class="tab-btn" data-tab="games" onclick="switchTab('games')">🎮 投资游戏</button>
</div>

<!-- ===== TAB: REPORTS ===== -->
<div class="tab-content active" id="tab-reports">
  <div class="stats-bar">报告 · <span id="totalReports">0</span> 篇 &nbsp;|&nbsp; 数据 · 恒生聚源数据库</div>
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="搜索企业名称、行业、标签、指标…" oninput="onSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-hint"><kbd>Ctrl+K</kbd> 快速搜索</div>
  </div>
  <div class="catalog" id="catalog">
    <div id="catalogHeader"><h2>📂 企业研究报告</h2></div>
    <div class="card-grid" id="cardGrid"></div>
    <div id="noResults" style="display:none;text-align:center;padding:40px 16px">
      <div style="font-size:36px;margin-bottom:10px">🔍</div>
      <div style="color:var(--m5);font-size:13px">没有找到匹配的报告</div>
      <div style="color:var(--m6);font-size:11px;margin-top:4px">试试其他关键词？</div>
    </div>
  </div>
</div>

<!-- ===== TAB: BOOKS ===== -->
<div class="tab-content" id="tab-books">
  <div class="stats-bar">书籍 · <span id="totalBooks">0</span> 本 &nbsp;|&nbsp; 价值投资经典</div>
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="bookSearch" type="text" placeholder="搜索书名、作者、金句…" oninput="onBookSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="bookSearchClear" onclick="clearBookSearch()">✕</button>
    </div>
    <div class="search-hint">搜索书名、作者名或关键词</div>
  </div>
  <div class="catalog">
    <h2>📚 价值投资经典书库</h2>
    <div class="books-subtitle" id="booksSubtitle"></div>
    <div class="card-grid" id="bookGrid"></div>
    <div id="bookNoResults" style="display:none;text-align:center;padding:40px 16px">
      <div style="font-size:36px;margin-bottom:10px">📚</div>
      <div style="color:var(--m5);font-size:13px">没有找到匹配的书籍</div>
      <div style="color:var(--m6);font-size:11px;margin-top:4px">试试其他关键词？</div>
    </div>
  </div>
</div>

<!-- ===== TAB: GAMES ===== -->
<div class="tab-content" id="tab-games">
  <div class="games-placeholder">
    <div class="icon">🎮</div>
    <h2>投资游戏 · 即将上线</h2>
    <p>趣味投资知识挑战即将到来，帮助您在游戏中巩固价值投资理念。</p>
  </div>
</div>

<!-- ===== REPORT VIEW (fullscreen) ===== -->
<div class="detail-view" id="reportView">
  <div class="detail-toolbar">
    <button class="back-btn" onclick="closeReport()">← 返回目录</button>
    <div class="detail-title-bar"><span id="reportTitle">报告</span></div>
  </div>
  <div class="detail-scroll" style="display:none;padding:0">
    <div class="loading" id="reportLoading">
      <div class="spinner"></div>
      <span>加载报告中…</span>
    </div>
    <iframe class="" id="reportFrame" style="width:100%;height:100%;border:none;display:none" onload="onFrameLoaded()"></iframe>
  </div>
</div>

<!-- ===== BOOK DETAIL VIEW (fullscreen) ===== -->
<div class="detail-view" id="bookDetailView">
  <div class="detail-toolbar">
    <button class="back-btn" onclick="closeBookDetail()">← 返回书库</button>
    <div class="detail-title-bar"><span id="bookDetailTitle">书籍详情</span></div>
  </div>
  <div class="detail-scroll" id="bookDetailContent">
    <div class="loading"><div class="spinner"></div><span>加载中…</span></div>
  </div>
</div>

<script src="books-data.js"></script>
<script>
const COMPANIES = [
  {id:'maotai',name:'贵州茅台',nameEn:'Kweichow Moutai',score:7.0,scoreMax:10,color:'#f0c040',industry:'食品饮料 · 白酒',desc:'中国高端白酒行业绝对龙头，A股最具代表性的消费类核心资产。',tags:['核心资产','国酒','高毛利'],metrics:{营收:'1,899亿',净利:'910亿',毛利率:'91%+',PE:'20.7x',ROE:'28%',股息率:'3.2%'},file:'maotai.html'},
  {id:'zhongjixuchuang',name:'中际旭创',nameEn:'Zhongji Innolight',score:7.5,scoreMax:10,color:'#4fc3f7',industry:'通信 · 光模块',desc:'全球光模块行业龙头，AI算力基础设施核心受益者。',tags:['AI算力','光模块','出海'],metrics:{营收:'258亿',净利:'58.7亿',毛利率:'35.8%',PE:'21.5x',ROE:'25%',净利率:'22.7%'},file:'zhongjixuchuang.html'}
]

// ===== THEME =====
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light'
  if (isLight) {
    document.documentElement.removeAttribute('data-theme')
    localStorage.setItem('portal_theme', 'dark')
    document.getElementById('themeToggle').textContent = '🌙'
  } else {
    document.documentElement.setAttribute('data-theme', 'light')
    localStorage.setItem('portal_theme', 'light')
    document.getElementById('themeToggle').textContent = '☀️'
  }
}

// Restore saved theme
if (localStorage.getItem('portal_theme') === 'light') {
  document.documentElement.setAttribute('data-theme', 'light')
  document.getElementById('themeToggle').textContent = '☀️'
}

// ===== TAB SWITCHING =====
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'))
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'))
  document.getElementById('tab-'+name).classList.add('active')
  document.querySelector('.tab-btn[data-tab="'+name+'"]').classList.add('active')
}

// ===== SEARCH & CATALOG =====
let searchQuery = ''
document.addEventListener('DOMContentLoaded', () => { renderCatalog(); renderBooks() })
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('reportView').classList.contains('active')) closeReport()
    else if (document.getElementById('bookDetailView').classList.contains('active')) closeBookDetail()
    else if (searchQuery) clearSearch()
  }
  if ((e.ctrlKey||e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus() }
})

function renderCatalog(query) {
  query = (query||'').toLowerCase().trim()
  const grid = document.getElementById('cardGrid')
  const noRes = document.getElementById('noResults')
  const hdr = document.getElementById('catalogHeader')
  const filtered = query ? COMPANIES.filter(c => [c.name,c.nameEn,c.industry,c.desc,...c.tags,...Object.entries(c.metrics).map(([k,v])=>k+' '+v)].join(' ').toLowerCase().includes(query)) : COMPANIES
  document.getElementById('totalReports').textContent = COMPANIES.length
  grid.innerHTML = filtered.map(c => {
    const deg = ((c.score/c.scoreMax*100)/100*360).toFixed(0)
    const metHTML = Object.keys(c.metrics).map(k => `<span>${k}: ${c.metrics[k]}</span>`).join('')
    const tagsHTML = c.tags.map(t => `<span class="tag" style="background:${c.color}15;color:${c.color};border-color:${c.color}20">${t}</span>`).join('')
    return `<div class="card" onclick="openReport('${c.id}')"><div class="card-row"><div class="card-score"><svg class="card-score-ring" viewBox="0 0 36 36"><path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="var(--b1)" stroke-width="3"/><path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="${c.color}" stroke-width="3" stroke-dasharray="${deg}, 360" stroke-linecap="round"/></svg><div class="card-score-inner"><div class="card-score-num" style="color:${c.color}">${c.score}</div><div class="card-score-label">/${c.scoreMax}</div></div></div><div class="card-info"><div class="card-name">${c.name}</div><div class="card-name-en">${c.nameEn}</div><div class="card-desc">${c.industry}</div><div class="card-tags">${tagsHTML}</div><div class="card-metrics">${metHTML}</div></div></div></div>`
  }).join('')
  noRes.style.display = filtered.length===0?'block':'none'
  hdr.innerHTML = query ? `<h2>📂 搜索结果 · 共 <span style="color:var(--accent)">${filtered.length}</span> 篇匹配</h2>` : `<h2>📂 企业研究报告 · 共 <span style="color:var(--m2)">${COMPANIES.length}</span> 篇</h2>`
}

function onSearch(val) { searchQuery=val; document.getElementById('searchClear').classList.toggle('visible',val.length>0); renderCatalog(val) }
function clearSearch() { document.getElementById('searchInput').value=''; document.getElementById('searchClear').classList.remove('visible'); onSearch('') }

function openReport(id) {
  const c = COMPANIES.find(x=>x.id===id); if(!c) return
  document.getElementById('reportTitle').innerHTML = `<span>${c.name}</span> · ${c.industry}`
  document.getElementById('reportView').classList.add('active')
  document.getElementById('reportLoading').style.display='flex'
  document.getElementById('reportFrame').style.display='none'
  document.getElementById('reportFrame').src='reports/'+c.file
}
function closeReport() { document.getElementById('reportView').classList.remove('active'); document.getElementById('reportFrame').src='' }
function onFrameLoaded() { document.getElementById('reportLoading').style.display='none'; document.getElementById('reportFrame').style.display='block' }

// ===== BOOKS =====
let bookSearchQuery = ''
function renderBooks(query) {
  query = (query||'').toLowerCase().trim()
  const grid = document.getElementById('bookGrid'); const noRes = document.getElementById('bookNoResults'); const sub = document.getElementById('booksSubtitle')
  const filtered = query ? BOOKS.filter(b => [b.title,b.titleEn,b.author,b.authorEn,...b.tags,...b.quotes.map(q=>q.text)].join(' ').toLowerCase().includes(query)) : BOOKS
  document.getElementById('totalBooks').textContent = BOOKS.length
  grid.innerHTML = filtered.map(b => {
    const stars = '★'.repeat(b.rating)+'☆'.repeat(5-b.rating)
    const tagsHTML = b.tags.map(t => `<span class="tag" style="background:${b.color}15;color:${b.color};border-color:${b.color}20">${t}</span>`).join('')
    return `<div class="card" onclick="openBook('${b.id}')"><div class="card-row"><div style="font-size:36px;flex-shrink:0;width:48px;text-align:center">${b.coverEmoji}</div><div class="card-info"><div class="card-name">${b.title}</div><div class="card-name-en">${b.titleEn}</div><div class="card-author" style="color:${b.color}">${b.author} · ${b.year}</div><div style="font-size:10px;color:${b.color};letter-spacing:1px;margin-bottom:4px">${stars}</div><div class="card-tags">${tagsHTML}</div><div class="card-desc">${b.intro.slice(0,80)}…</div></div></div></div>`
  }).join('')
  noRes.style.display = filtered.length===0?'block':'none'
  sub.textContent = query ? `搜索 · ${filtered.length} 本匹配` : `${BOOKS.length} 本经典 · 从基础到进阶`
}
function onBookSearch(val) { bookSearchQuery=val; document.getElementById('bookSearchClear').classList.toggle('visible',val.length>0); renderBooks(val) }
function clearBookSearch() { document.getElementById('bookSearch').value=''; document.getElementById('bookSearchClear').classList.remove('visible'); onBookSearch('') }

function openBook(id) {
  const b = BOOKS.find(x=>x.id===id); if(!b) return
  document.getElementById('bookDetailTitle').innerHTML = `<span>${b.title}</span> · ${b.author}`
  document.getElementById('bookDetailView').classList.add('active')
  const stars = '★'.repeat(b.rating)+'☆'.repeat(5-b.rating)
  const tagsHTML = b.tags.map(t => `<span class="tag" style="background:${b.color}15;color:${b.color};border-color:${b.color}20">${t}</span>`).join('')
  const archHTML = b.architecture.map((a,i) => `
    <div class="arch-item">
      <div class="arch-header" onclick="toggleArch(${i})">
        <span class="arch-title">${a.title}</span>
        <span class="arch-toggle" id="archToggle${i}">▼</span>
      </div>
      <div class="arch-body" id="archBody${i}">
        ${a.chapters.map((ch,ci) => `
          <div class="chapter-item">
            <div class="chapter-header" onclick="event.stopPropagation();toggleChapter('${b.id}',${i},${ci})">
              <span class="chapter-toggle" id="chT_${b.id}_${i}_${ci}">▶</span>
              <span class="chapter-title">${ch.title}</span>
            </div>
            <div class="chapter-body" id="chB_${b.id}_${i}_${ci}">${ch.content.replace(/\n/g,'<br>')}</div>
          </div>
        `).join('')}
        <div class="arch-summary" style="margin-top:12px">${a.summary}</div>
      </div>
    </div>`).join('')
  const quotesHTML = b.quotes.map(q => `<div class="quote-item"><div class="quote-text">${q.text}</div><div class="quote-context">— ${q.context}</div></div>`).join('')
  document.getElementById('bookDetailContent').innerHTML = `
    <div class="detail-section"><div class="detail-hero"><div class="detail-emoji">${b.coverEmoji}</div><div><h3 style="font-size:18px;margin-bottom:2px">${b.title}</h3><div style="font-size:12px;color:var(--m3);margin-bottom:2px">${b.titleEn}</div><div style="font-size:12px;color:${b.color}">${b.author} · ${b.year}</div><div style="font-size:11px;color:${b.color};letter-spacing:1px;margin:4px 0">${stars}</div><div class="card-tags">${tagsHTML}</div></div></div></div>
    <div class="detail-section"><h3>📖 书籍简介</h3><p>${b.intro}</p></div>
    <div class="detail-section"><h3>🏗️ 全书架构</h3>${archHTML}</div>
    <div class="detail-section"><h3>💬 经典金句 · ${b.quotes.length} 条</h3><div class="quote-grid">${quotesHTML}</div></div>
    <div class="summary-card"><h3>📝 全书总结</h3><p>${b.summary}</p></div><div style="height:20px"></div>`
}
function closeBookDetail() { document.getElementById('bookDetailView').classList.remove('active'); document.getElementById('bookDetailContent').innerHTML = '<div class="loading"><div class="spinner"></div><span>加载中…</span></div>' }
function toggleArch(i) { document.getElementById('archBody'+i).classList.toggle('open'); document.getElementById('archToggle'+i).classList.toggle('open') }
function toggleChapter(bookId,archIdx,chIdx) { document.getElementById('chB_'+bookId+'_'+archIdx+'_'+chIdx).classList.toggle('open'); document.getElementById('chT_'+bookId+'_'+archIdx+'_'+chIdx).classList.toggle('open') }
</script>
</body>
</html>
