function buildLevel1(){
  var nodes = [];
  var links = [];
  // Hub
  nodes.push({
    id:'hub',name:'产业星图',icon:'🌌',value:['🌌','产业星图'],
    symbolSize:36,category:0,itemStyle:{color:'#a78bfa',shadowBlur:30,shadowColor:'rgba(167,139,250,0.4)'},
    label:{show:true,fontSize:13,fontWeight:'bold'},
  });
  // 31 industries arranged in a circle
  var n = SW_DATA.length;
  SW_DATA.forEach(function(d,i){
    var angle = (i/n)*Math.PI*2 - Math.PI/2;
    var r = 180;
    var x = Math.cos(angle)*r;
    var y = Math.sin(angle)*r;
    var hasInd = !!IND_LINKS[d.name];
    var cx = d.color || '#3b82f6';
    nodes.push({
      id:d.id,name:d.name,icon:d.icon,value:[d.icon,d.name],
      symbolSize:hasInd?26:22,
      category:1,
      x:x,y:y,
      fixed:true,
      itemStyle:{
        color:cx,shadowBlur:hasInd?15:5,shadowColor:cx+'40',
        borderColor:'rgba(255,255,255,'+(hasInd?'0.2':'0.05')+')',borderWidth:hasInd?1.5:0.5,
      },
      _hasResearch:hasInd,
      _sw1:d,
    });
    links.push({source:'hub',target:d.id});
  });
  return {nodes:nodes, links:links};
}

function buildLevel2(sw1Id){
  var sw1 = SW_DATA.find(function(d){return d.id===sw1Id});
  if(!sw1) return null;
  var nodes = [];
  var links = [];
  // Back to level1 node
  nodes.push({
    id:'back-'+sw1Id,name:sw1.name,icon:sw1.icon,value:['←','← '+sw1.name],
    symbolSize:18,category:0,itemStyle:{color:'rgba(167,139,250,0.4)',borderColor:'rgba(167,139,250,0.15)',borderWidth:1},
    _isBack:true,
    label:{show:true,fontSize:8},
  });
  links.push({source:'back-'+sw1Id,target:'hub-placeholder'});
  
  // Central industry hub
  var hasInd = !!IND_LINKS[sw1.name];
  nodes.push({
    id:sw1Id,name:sw1.name,icon:sw1.icon,value:[sw1.icon,sw1.name],
    symbolSize:32,category:0,itemStyle:{
      color:sw1.color,shadowBlur:25,shadowColor:sw1.color+'60',
      borderColor:'rgba(255,255,255,0.2)',borderWidth:2,
    },
    _hasResearch:hasInd,_sw1:sw1,
    _isCurrentHub:true,
    label:{show:true,fontSize:12,fontWeight:'bold'},
  });
  
  // Placeholder hub for centering
  nodes.push({id:'hub-placeholder',name:'',symbolSize:1,category:3,itemStyle:{color:'transparent',opacity:0},label:{show:false}});
  links.push({source:sw1Id,target:'hub-placeholder'});
  
  // Secondary industries
  var children = sw1.children || [];
  children.forEach(function(cname,i){
    var n = children.length;
    var angle = (i/n)*Math.PI*2 - Math.PI/2;
    var r = 130;
    var cx = sw1.color || '#3b82f6';
    
    // Companies in this secondary industry
    var companies = [];
    for(var key in COMPANY_SW2){
      if(COMPANY_SW2[key] === cname) companies.push(key);
    }
    var hasCompany = companies.length > 0;
    
    nodes.push({
      id:'sw2-'+cname,name:cname,icon:'📂',
      value:[hasCompany?'📂':'○', cname],
      symbolSize:hasCompany?18:14,
      category:2,
      x:Math.cos(angle)*r, y:Math.sin(angle)*r, fixed:true,
      itemStyle:{
        color:cx,shadowBlur:hasCompany?8:2,shadowColor:cx+'30',
        borderColor:'rgba(255,255,255,'+(hasCompany?'0.15':'0.03')+')',borderWidth:hasCompany?1:0.3,
        opacity:hasCompany?1:0.5,
      },
      _isSw2:true,_sw1Parent:sw1Id,_companyCount:companies.length,_companies:companies,
      label:{show:true,fontSize:7,color:'#94a3b8'},
    });
    links.push({source:sw1Id,target:'sw2-'+cname});
    
    // Company nodes
    companies.forEach(function(co,j){
      var link = COMPANY_LINKS[co] || '';
      var hasLink = !!link;
      var cAngle = angle + (j - (companies.length-1)/2)*0.15;
      var cr = 185;
      nodes.push({
        id:'co-'+co,name:co,icon:'🏢',
        value:['🏢', co],
        symbolSize:hasLink?12:8,
        category:3,
        x:Math.cos(cAngle)*cr,y:Math.sin(cAngle)*cr,fixed:true,
        itemStyle:{
          color:hasLink?'#34d399':'rgba(148,163,184,0.3)',
          shadowBlur:hasLink?10:0,shadowColor:'rgba(52,211,153,0.3)',
          borderColor:'rgba(255,255,255,'+(hasLink?'0.2':'0.05')+')',borderWidth:hasLink?1:0.3,
        },
        _isCompany:true,_companyName:co,_hasLink:hasLink,
        label:{show:true,fontSize:6,color:hasLink?'#94a3b8':'rgba(148,163,184,0.35)'},
      });
      links.push({source:'sw2-'+cname,target:'co-'+co});
    });
  });
  
  return {nodes:nodes, links:links};
}

      formatter:function(p){
        if(!p.data||p.dataType!=='node') return '';
        var d=p.data;var lt=document.body.classList.contains('light');
        var html='<div style="font-size:1rem;margin-bottom:2px">'+(d.icon||'●')+'</div>';
        html+='<div style="font-size:.75rem;font-weight:700;color:'+(lt?'#333':'#e2e8f0')+'">'+d.name+'</div>';
        if(d._hasResearch) html+='<div style="font-size:.5rem;color:'+(lt?'rgba(99,102,241,0.6)':'rgba(167,139,250,0.6)')+';margin-top:2px">🔬 已有行业研究 · 点击查看</div>';
        return html;
      },
      extraCssText:'background:rgba(10,10,30,0.92)!important;backdrop-filter:blur(12px)!important;border-radius:12px!important',
    },
    series:[{
      type:'graph',layout:'none',roam:true,draggable:true,
      data:data.nodes,links:data.links,
      lineStyle:{color:'source',curveness:0.1,width:0.4,opacity:0.12},
      label:{show:true,position:'bottom',formatter:function(p){return p.data?p.data.icon+' '+p.data.name:'';},fontSize:8,color:'#94a3b8',offset:[0,3]},
      emphasis:{focus:'adjacency',lineStyle:{width:1.5,opacity:0.3}},
      itemStyle:{borderColor:'rgba(255,255,255,0.1)',borderWidth:0.5},
      roam:true,nodeClick:false,
      categories:[{name:'中心',itemStyle:{color:'#a78bfa'}},{name:'一级行业',itemStyle:{color:'#6366f1'}},{name:'二级行业',itemStyle:{color:'#3b82f6'}},{name:'占位',itemStyle:{color:'transparent'}}],
    }],
  };
  currentOption = option;
  myChart.setOption(option);
  updateBreadcrumb([]);
}

function renderLevel2(sw1Id){
  state.view = 'level2';
  state.currentSw1 = sw1Id;
  var d = buildLevel2(sw1Id);
  if(!d) return;
  
  var sw1 = SW_DATA.find(function(x){return x.id===sw1Id});
  var hasInd = !!IND_LINKS[sw1.name];
  
  var option = {
    backgroundColor:'transparent',
    tooltip:{show:true,trigger:'item',backgroundColor:'rgba(10,10,30,0.92)',borderColor:'rgba(167,139,250,0.2)',borderWidth:1,borderRadius:12,padding:[10,14],
      formatter:function(p){
        if(!p.data||p.dataType!=='node') return '';
        var d=p.data;var lt=document.body.classList.contains('light');
        var html='<div style="font-size:1rem;margin-bottom:2px">'+(d.icon||'●')+'</div>';
        html+='<div style="font-size:.75rem;font-weight:700;color:'+(lt?'#333':'#e2e8f0')+'">'+d.name+'</div>';
        if(d._isBack) html+='<div style="font-size:.5rem;color:'+(lt?'rgba(99,102,241,0.5)':'rgba(167,139,250,0.5)')+';margin-top:2px">点击返回一级总览</div>';
        else if(d._isCurrentHub&&hasInd) html+='<div style="font-size:.5rem;color:rgba(52,211,153,0.7);margin-top:2px">🔬 查看行业百科 →</div>';
        else if(d._isCompany) html+=d._hasLink?'<div style="font-size:.5rem;color:rgba(52,211,153,0.7);margin-top:2px">📄 查看研究报告 →</div>':'<div style="font-size:.5rem;color:rgba(148,163,184,0.3);margin-top:2px">暂无研究</div>';
        else if(d._companyCount) html+='<div style="font-size:.5rem;color:rgba(148,163,184,0.4);margin-top:2px">'+d._companyCount+'家关联企业</div>';
        return html;
      },
      extraCssText:'background:rgba(10,10,30,0.92)!important;backdrop-filter:blur(12px)!important;border-radius:12px!important',
    },
    series:[{
      type:'graph',layout:'none',roam:true,draggable:true,
      data:d.nodes,links:d.links,
      lineStyle:{color:'source',curveness:0.1,width:0.5,opacity:0.2},
      label:{show:true,position:'bottom',formatter:function(p){
        if(!p.data) return '';
        if(p.data._isBack) return '';
        return p.data.icon+' '+p.data.name;
      },fontSize:7.5,color:'#94a3b8',offset:[0,2]},
      emphasis:{focus:'adjacency',lineStyle:{width:1.5,opacity:0.4}},
      itemStyle:{borderColor:'rgba(255,255,255,0.1)',borderWidth:0.5},
      roam:true,nodeClick:false,
      categories:[{name:'行业',itemStyle:{color:'#a78bfa'}},{name:'二级行业',itemStyle:{color:'#6366f1'}},{name:'企业',itemStyle:{color:'#3b82f6'}},{name:'占位',itemStyle:{color:'transparent'}}],
    }],
  };
  currentOption = option;
  myChart.setOption(option);
  
  // Breadcrumb
  updateBreadcrumb([{name:sw1.name,id:sw1.id}]);
}

// ===== Click handler =====
myChart.on('click', function(params){
  if(params.dataType !== 'node' || !params.data) return;
  var d = params.data;
  
  // Back button
  if(d._isBack){
    renderLevel1();
    return;
  }
  
  // Level1: click industry to expand
  if(state.view === 'level1' && d._sw1){
    renderLevel2(d._sw1.id);
    return;
  }
  
  // Level2: click industry hub → encyclopedia
  if(d._isCurrentHub && d._hasResearch){
    var link = IND_LINKS[d.name];
    if(link) window.open(link, '_blank');
    return;
  }
  
  // Level2: click company → report
  if(d._isCompany && d._hasLink){
    var link = COMPANY_LINKS[d._companyName];
    if(link) window.open(link, '_blank');
    return;
  }
  
  // Level2: click industry hub without research → just info
});

// ===== Reset on blank click =====
myChart.on('click', function(params){
  if(params.dataType !== 'node'){
    if(state.view === 'level2') renderLevel1();
  }
});

// ===== Double-click =====
myChart.on('dblclick', function(params){
  if(state.view === 'level2' && (!params.data || params.dataType !== 'node')){
    renderLevel1();
  }
});

// ===== Search =====
var searchTimeout = null;
function onSearch(val){
  clearTimeout(searchTimeout);
  var q = val.trim().toLowerCase();
  var results = document.getElementById('searchResults');
  if(!q){
    results.style.display = 'none';
    return;
  }
  var items = [];
  // Search SW1
  SW_DATA.forEach(function(d){
    if(d.name.toLowerCase().includes(q) || d.id.includes(q)){
      items.push({name:d.name,icon:d.icon,type:'一级行业',_sw1:d});
    }
    // Search children
    (d.children||[]).forEach(function(c){
      if(c.toLowerCase().includes(q)){
        items.push({name:c,icon:'📂',type:'二级行业',_sw1Parent:d.id});
      }
    });
  });
  // Search companies
  for(var key in COMPANY_SW2){
    if(key.toLowerCase().includes(q)){
      items.push({name:key,icon:'🏢',type:'企业',_isCompany:true,_hasLink:!!COMPANY_LINKS[key]});
    }
  }
  // Deduplicate
  var seen = {};
  items = items.filter(function(it){if(seen[it.name])return false;seen[it.name]=true;return true;});
  items = items.slice(0, 15);
  
  if(items.length===0){
    results.style.display='none';
    return;
  }
  var html = items.map(function(it){
    var extra = '';
    if(it._sw1 && IND_LINKS[it._sw1.name]) extra='🔬';
    if(it._isCompany && it._hasLink) extra='📄';
    return '<div class="sr-item" onclick="searchGo(''+it.name.replace(/'/g,"\'")+'',''+(it._sw1?it._sw1.id:it._sw1Parent||'')+'','+(it._isCompany?'true':'false')+')">'+it.icon+' '+it.name+' <span style="color:rgba(148,163,184,0.3);margin-left:4px">'+it.type+'</span> '+extra+'</div>';
  }).join('');
  results.innerHTML = html;
  results.style.display = 'block';
}

function searchGo(name,sw1Id,isCompany){
  document.getElementById('searchResults').style.display='none';
  document.getElementById('searchInput').value='';
  if(isCompany){
    // Navigate to company report
    var link = COMPANY_LINKS[name];
    if(link) {window.open(link,'_blank');return;}
  }
  // Navigate to industry
  var sw1 = SW_DATA.find(function(d){return d.id===sw1Id||d.name===name});
  if(sw1) {renderLevel2(sw1.id);return;}
  // Maybe it's a SW1 name
  var sw1ByName = SW_DATA.find(function(d){return d.name===name});
  if(sw1ByName) {renderLevel2(sw1ByName.id);return;}
}

// Hide search on click outside
document.addEventListener('click', function(e){
  if(!e.target.closest('#searchInput')&&!e.target.closest('#searchResults')){
    document.getElementById('searchResults').style.display='none';
  }
});

// ===== Breadcrumb =====
function updateBreadcrumb(path){
  var el = document.getElementById('breadcrumb');
  var html = '<span class="bc-item" onclick="renderLevel1()">🌌 产业星图</span>';
  path.forEach(function(p,i){
    html += '<span class="bc-sep">›</span>';
    if(i===path.length-1){
      html += '<span class="bc-current">'+p.name+'</span>';
    } else {
      html += '<span class="bc-item" onclick="renderLevel2(''+p.id+'')">'+p.name+'</span>';
    }
  });
  el.innerHTML = html;
}

// ===== Theme =====
function applyTheme(theme){
  if(theme==='light'){
    document.body.classList.add('light');
    if(currentOption){
      currentOption.series[0].label.color='#505050';
      myChart.setOption(currentOption);
    }
  } else {
    document.body.classList.remove('light');
    if(currentOption){
      currentOption.series[0].label.color='#94a3b8';
      myChart.setOption(currentOption);
    }
  }
}

(function(){
  var t=localStorage.getItem('portal_theme');
  if(t==='light') applyTheme('light');
  window.addEventListener('message',function(e){
    if(e.data&&typeof e.data.theme==='string') applyTheme(e.data.theme);
    if(e.data&&e.data.backToIndustrySelect) goBack();
  });
})();

// ===== Back =====
function goBack(){
  if(window.parent&&window.parent!==window){
    window.parent.postMessage({backToIndustrySelect:true},'*');
  } else {
    window.location.href='index.html';
  }
}
