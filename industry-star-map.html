<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#06061a;overflow:hidden;height:100vh;color:#e2e8f0}
#chart{width:100%;height:100vh}
/* Tooltip style */
.etip{background:rgba(10,10,30,0.92)!important;backdrop-filter:blur(12px)!important;border:1px solid rgba(167,139,250,0.2)!important;border-radius:12px!important;padding:10px 14px!important;box-shadow:0 8px 32px rgba(0,0,0,0.5)!important}
.etip .tip-icon{font-size:1.2rem}
.etip .tip-name{font-size:.8rem;font-weight:700;color:#e2e8f0;margin:2px 0}
.etip .tip-desc{font-size:.6rem;color:#94a3b8;line-height:1.5}
.etip .tip-path{font-size:.5rem;color:rgba(167,139,250,0.5);margin-top:2px}
/* Back button */
#backBtn{position:fixed;top:16px;left:16px;z-index:100;background:rgba(10,10,30,0.6);border:1px solid rgba(167,139,250,0.15);border-radius:10px;padding:6px 12px;cursor:pointer;font-size:.6rem;color:rgba(167,139,250,0.7);transition:all .2s;display:flex;align-items:center;gap:4px;backdrop-filter:blur(8px)}
#backBtn:hover{background:rgba(167,139,250,0.1);color:#a78bfa}
/* Title */
#title{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;font-size:.7rem;font-weight:600;color:rgba(148,163,184,0.5);letter-spacing:2px;pointer-events:none}
/* Light theme */
body.light{background:#f4f1ea!important}
body.light #backBtn{background:rgba(245,240,230,0.85)!important;border-color:rgba(167,139,250,0.2)!important;color:rgba(99,102,241,0.8)!important}
body.light #backBtn:hover{background:rgba(167,139,250,0.12)!important;color:#6366f1!important}
body.light #title{color:rgba(80,80,80,0.4)!important}
@media(max-width:768px){#title{font-size:.55rem;top:12px}}
</style>
</head>
<body>
<div id="backBtn" onclick="goBack()">← 返回</div>

    {name:'储能',icon:'🔋',desc:'锂电池·钠电池·液流·压缩空气'},
    {name:'氢能/燃料电池',icon:'💧',desc:'电解槽·储氢·燃料电池'},

    {name:'机器人产业',icon:'🤖',desc:'人形·工业·协作·服务·无人机',link:'robot-encyclopedia.html',
      children:[

  // ===== 生物医药 =====
  {sector:'生物医药',children:[

      children:[
        {name:'同仁堂',icon:'🏢',link:'600085.html'},{name:'达仁堂',icon:'🏢',link:'600329.html'},
        {name:'马应龙',icon:'🏢',link:'600993.html'},{name:'浙江震元',icon:'🏢',link:'000705.html'},
      ]},

  {sector:'消费',children:[

      children:[

  ]},
  // ===== 金融 =====
  {sector:'金融',children:[
    {name:'券商/投行',icon:'📈',desc:'经纪·投行·资管·自营',
      children:[{name:'中信证券',icon:'🏢',link:'600030.html'}]},
    {name:'银行',icon:'🏦',desc:'国有大行·股份行·城农商行'},
    {name:'保险',icon:'🛡️',desc:'寿险·财险·再保险'},
    {name:'基金/资管',icon:'💰',desc:'公募·私募·理财子'},

      children:[{name:'云铝股份',icon:'🏢',desc:'绿色铝龙头',link:'000807.html'}]},
    {name:'基础化工',icon:'🧪',desc:'石化·煤化·氟化工·钛白粉'},
    {name:'钢铁',icon:'🔩',desc:'特钢·普钢·不锈钢'},
    {name:'煤炭',icon:'🪨',desc:'动力煤·焦煤·煤化工'},
    {name:'建材',icon:'🧱',desc:'水泥·玻璃·玻纤·防水'},
  ]},
  // ===== 地产基建 =====
  {sector:'地产基建',children:[
    {name:'房地产',icon:'🏘️',desc:'开发·物业·商业地产'},
    {name:'建筑/工程',icon:'🏗️',desc:'房建·基建·钢结构·装饰'},
    {name:'工程机械',icon:'🚜',desc:'挖掘机·起重机·混凝土·叉车'},
    {name:'基建设施',icon:'🌉',desc:'铁路·公路·港口·机场'},
  ]},
];

// =====================================================================
// 构建ECharts图数据
// =====================================================================
var nodes = [];
var links = [];
var nodeMap = {};
var idCounter = 0;

function addNode(name, icon, category, desc, link, sector, symbolSize) {
  if(nodeMap[name]) return nodeMap[name];
  var id = 'n' + (idCounter++);
  nodeMap[name] = id;
  var color = SECTOR_COLORS[sector] || '#a78bfa';
  var node = {
    id: id,
    name: name,
    icon: icon || '●',
    desc: desc || '',
    link: link || '',
    sector: sector || '',
    category: category || 2,
    value: [icon || '●', name],
    symbolSize: symbolSize || 20,
    itemStyle: {color: color, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1},
    label: {show: category <= 1, fontSize: category===0?12:10, color: '#e2e8f0'},
  };
  // Top level gets glow
  if(category === 0) {
    node.itemStyle.shadowBlur = 20;
    node.itemStyle.shadowColor = color + '60';
  }
  nodes.push(node);
  return id;
}

function buildGraph(tree, parentId, sector, depth) {
  tree.forEach(function(item) {
    var cat = Math.min(depth, 2);
    var sz = [32, 22, 14][Math.min(depth, 2)];
    var nodeId = addNode(item.name, item.icon, cat, item.desc, item.link, sector, sz);
    if(parentId) links.push({source: parentId, target: nodeId});
    if(item.children) buildGraph(item.children, nodeId, sector, depth+1);
  });
}

// Build from tree
INDUSTRY_TREE.forEach(function(sectorGroup) {
  var sector = sectorGroup.sector;
  var sectorId = addNode(sector, getSectorIcon(sector), 0, '', '', sector, 38);
  buildGraph(sectorGroup.children, sectorId, sector, 1);
});

function getSectorIcon(sector) {
  var map = {
    '信息技术':'🖥️','新能源':'⚡','先进制造':'🏭',
    '生物医药':'💊','消费':'🍶','金融':'💰',
    '周期材料':'🪨','地产基建':'🏗️',
  };
  return map[sector] || '📊';
}

// =====================================================================
// ECharts 渲染
// =====================================================================
var chartDom = document.getElementById('chart');
var myChart = echarts.init(chartDom, 'dark');

var option = {
  backgroundColor: 'transparent',
  tooltip: {
    show: true,
    trigger: 'item',
    backgroundColor: 'rgba(10,10,30,0.92)',
    borderColor: 'rgba(167,139,250,0.2)',
    borderWidth: 1,
    borderRadius: 12,
    padding: [12, 16],
    textStyle: {color: '#e2e8f0', fontSize: 12, fontFamily: 'Noto Sans SC'},
    formatter: function(params) {
      if(!params.data || params.dataType !== 'node') return '';
      var d = params.data;
      var isLight = document.body.classList.contains('light');
      var icon = d.icon || '●';
      var html = '<div style="font-size:1.1rem;margin-bottom:2px">' + icon + '</div>';
      html += '<div style="font-size:.8rem;font-weight:700;color:' + (isLight?'#333':'#e2e8f0') + '">' + d.name + '</div>';
      if(d.desc) html += '<div style="font-size:.58rem;color:' + (isLight?'#666':'#94a3b8') + ';margin-top:2px;max-width:200px">' + d.desc + '</div>';
      if(d.link) html += '<div style="font-size:.52rem;color:' + (isLight?'rgba(99,102,241,0.7)':'rgba(167,139,250,0.6)') + ';margin-top:3px">点击跳转 →</div>';
      return html;
    },
    extraCssText: 'background:rgba(10,10,30,0.92)!important;backdrop-filter:blur(12px)!important;border:1px solid rgba(167,139,250,0.2)!important;border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,0.5)!important;font-family:Noto Sans SC!important',
  },
  series: [{
    type: 'graph',
    layout: 'force',
    force: {
      repulsion: 300,
      edgeLength: [80, 200],
      gravity: 0.05,
      friction: 0.1,
      layoutAnimation: true,
    },
    roam: true,
    draggable: true,
    data: nodes,
    links: links,
    categories: [
      {name:'一级行业',itemStyle:{color:'#a78bfa'}},
      {name:'二级赛道',itemStyle:{color:'#6366f1'}},
      {name:'企业/细分',itemStyle:{color:'#3b82f6'}},
    ],
    edgeLabel: {show: false},
    lineStyle: {
      color: 'source',
      curveness: 0.1,
      width: 0.5,
      opacity: 0.15,
    },
    label: {
      show: true,
      position: 'bottom',
      formatter: function(params){
        if(!params.data) return '';
        return params.data.icon + ' ' + params.data.name;
      },
      fontSize: 9,
      color: '#94a3b8',
      fontFamily: 'Noto Sans SC',
      offset: [0, 4],
    },
    emphasis: {
      focus: 'adjacency',
      lineStyle: {width: 1.5, opacity: 0.4},
    },
    itemStyle: {
      borderColor: 'rgba(255,255,255,0.1)',
      borderWidth: 1,
    },
    roam: true,
    nodeClick: false, // disable default, handle custom
  }],
};

myChart.setOption(option);

// ===== Click handler =====
myChart.on('click', function(params) {
  if(params.dataType !== 'node' || !params.data) return;
  var d = params.data;
  if(d.link) {
    window.open(d.link, '_blank');
  }
});

// ===== Resize =====
window.addEventListener('resize', function() {
  myChart.resize();
});

// ===== Keyboard =====
document.addEventListener('keydown', function(e) {
  if(e.key === 'Escape') goBack();
});

// ===== Back =====
function goBack() {
  if(window.parent && window.parent !== window) {
    window.parent.postMessage({backToIndustrySelect: true}, '*');
  } else {
    window.location.href = 'index.html';
  }
}

// ===== Theme sync =====
function applyTheme(theme){
  if(theme === 'light'){
    document.body.classList.add('light');
    // Update ECharts labels for light theme
    myChart.setOption({
      series: [{
        label: {color: '#505050'},
      }],
      tooltip: {
        textStyle: {color: '#333'},
        extraCssText: 'background:rgba(250,248,240,0.95)!important;border:1px solid rgba(167,139,250,0.2)!important;border-radius:12px!important;box-shadow:0 4px 16px rgba(0,0,0,0.08)!important',
      },
    });
  } else {
    document.body.classList.remove('light');
    myChart.setOption({
      series: [{
        label: {color: '#94a3b8'},
      }],
      tooltip: {
        textStyle: {color: '#e2e8f0'},
        extraCssText: 'background:rgba(10,10,30,0.92)!important;backdrop-filter:blur(12px)!important;border:1px solid rgba(167,139,250,0.2)!important;border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,0.5)!important',
      },
    });
  }
}

(function(){
  var t = localStorage.getItem('portal_theme');
  if(t === 'light') applyTheme('light');
  window.addEventListener('message', function(e){
    if(e.data && typeof e.data.theme === 'string') {
      applyTheme(e.data.theme);
    }
    if(e.data && e.data.backToIndustrySelect) {
      goBack();
    }
  });
})();

console.log('🌌 产业星图(ECharts) loaded! Nodes:', nodes.length, 'Links:', links.length);
</script>
</body>
</html>
