<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🌌 产业星图 · 申万全行业</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06061a;overflow:hidden;height:100dvh;font-family:sans-serif}
#c{width:100%;height:100dvh}
#bar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;padding:6px 10px;background:rgba(6,6,26,0.8);gap:6px;color:#94a3b8;font-size:11px}
#bar button{background:transparent;border:1px solid rgba(167,139,250,0.1);border-radius:6px;padding:3px 8px;color:rgba(167,139,250,0.5);font-size:10px;cursor:pointer}
#bc{flex:1;display:flex;gap:3px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;font-size:10px}
#bc span{cursor:pointer;padding:1px 4px;border-radius:3px;color:rgba(148,163,184,0.4)}
#bc .cur{color:rgba(167,139,250,0.6);font-weight:600}
#in{padding:2px 6px;border-radius:4px;border:1px solid rgba(167,139,250,0.1);background:rgba(167,139,250,0.04);color:#94a3b8;font-size:10px;width:80px;outline:none}
#hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(148,163,184,0.15);pointer-events:none}
.sr-item{padding:3px 8px;cursor:pointer;font-size:10px;color:#94a3b8;border-radius:4px}
.sr-item:hover{background:rgba(167,139,250,0.1)}
body.light{background:#f4f1ea}
body.light #bar{background:rgba(244,241,234,0.85)}
body.light #in{color:#505050}
body.light #hint{color:rgba(80,80,80,0.12)}
</style>
</head>
<body>
<div id="bar"><button onclick="goBack()">←</button><div id="bc"></div><input id="in" placeholder="🔍" oninput="srch(this.value)"></div>
<div id="c"></div>
<div id="hint">点击行业展开 · 滚轮缩放 · 拖拽移动</div>
<script>
var SW=[{"id":"sw1","name":"农林牧渔","icon":"🌾","color":"#22d3ee","children":["种植业","渔业","林业","饲料","养殖业","农产品加工","农业综合"]},{"id":"sw2","name":"食品饮料","icon":"🍶","color":"#fbbf24","children":["白酒","啤酒","其他酒类","软饮料","乳品","调味发酵品","食品综合","肉制品","休闲食品"]},{"id":"sw3","name":"纺织服饰","icon":"👔","color":"#fb7185","children":["纺织品","服装家纺","皮革制品"]},{"id":"sw4","name":"轻工制造","icon":"📦","color":"#34d399","children":["造纸","包装印刷","家具","文娱用品","其他轻工"]},{"id":"sw5","name":"医药生物","icon":"💊","color":"#fb7185","children":["化学制药","中药","生物制品","医药商业","医疗器械","医疗服务"]},{"id":"sw6","name":"公用事业","icon":"⚡","color":"#f97316","children":["电力","燃气","供水","环保","市政工程"]},{"id":"sw7","name":"交通运输","icon":"🚄","color":"#f97316","children":["铁路","公路","机场","港口","航运","航空","物流"]},{"id":"sw8","name":"房地产","icon":"🏘️","color":"#f97316","children":["房地产开发","产业地产","商业地产","物业管理","房地产服务"]},{"id":"sw9","name":"商贸零售","icon":"🛒","color":"#fbbf24","children":["百货","超市","专业连锁","电商","贸易","商业物业经营"]},{"id":"sw10","name":"社会服务","icon":"🎭","color":"#fbbf24","children":["酒店","餐饮","旅游景区","休闲服务","教育","专业服务"]},{"id":"sw11","name":"美容护理","icon":"💄","color":"#fb7185","children":["美容护理","化妆品","个护用品"]},{"id":"sw12","name":"银行","icon":"🏦","color":"#eab308","children":["国有大型银行","股份制银行","城商行","农商行","银行"]},{"id":"sw13","name":"非银金融","icon":"💰","color":"#eab308","children":["证券","保险","多元金融","金融信息服务"]},{"id":"sw14","name":"综合","icon":"📊","color":"#94a3b8","children":["综合"]},{"id":"sw15","name":"建筑材料","icon":"🧱","color":"#fb923c","children":["水泥","玻璃","玻纤","耐火材料","管材","其他建材"]},{"id":"sw16","name":"建筑装饰","icon":"🏗️","color":"#fb923c","children":["房屋建设","基础建设","钢结构","装修装饰","园林工程"]},{"id":"sw17","name":"电力设备","icon":"🔋","color":"#22d3ee","children":["光伏设备","风电设备","储能设备","电池","电网设备","电机","综合电力设备"]},{"id":"sw18","name":"机械设备","icon":"⚙️","color":"#22d3ee","children":["通用机械","专用机械","仪器仪表","自动化设备","工程机械","轨交设备"]},{"id":"sw19","name":"汽车","icon":"🚗","color":"#22d3ee","children":["乘用车","商用车","汽车零部件","汽车服务","摩托车"]},{"id":"sw20","name":"家用电器","icon":"🏠","color":"#fbbf24","children":["白电","黑电","厨电","小家电","照明","零部件"]},{"id":"sw21","name":"有色金属","icon":"🪨","color":"#fb923c","children":["铜","铝","铅锌","黄金","稀土","锂","钨","新材料"]},{"id":"sw22","name":"钢铁","icon":"🔩","color":"#fb923c","children":["普钢","特钢","铁矿石","钢加工","冶钢原料"]},{"id":"sw23","name":"基础化工","icon":"🧪","color":"#fb923c","children":["石油化工","煤化工","氟化工","氯碱","化纤","塑料","橡胶","农药","化肥","涂料油墨","电子化学品"]},{"id":"sw24","name":"石油石化","icon":"🛢️","color":"#fb923c","children":["石油开采","炼化","油田服务","油气储运","油品销售"]},{"id":"sw25","name":"煤炭","icon":"🪨","color":"#fb923c","children":["动力煤","焦煤","焦炭","煤化工"]},{"id":"sw26","name":"环保","icon":"🌿","color":"#34d399","children":["水治理","固废治理","大气治理","环境监测","生态修复"]},{"id":"sw27","name":"国防军工","icon":"🛡️","color":"#22d3ee","children":["航空航天装备","船舶","兵器","军工电子","军工材料"]},{"id":"sw28","name":"计算机","icon":"💻","color":"#3b82f6","children":["软件开发","IT服务","云计算","人工智能","信息安全","计算机设备"]},{"id":"sw29","name":"电子","icon":"🔬","color":"#3b82f6","children":["半导体","芯片设计","消费电子","电子元件","光学光电子","电子化学品II"]},{"id":"sw30","name":"通信","icon":"📡","color":"#3b82f6","children":["通信网络设备","通信运营","通信服务","光通信","卫星通信"]},{"id":"sw31","name":"传媒","icon":"🎬","color":"#3b82f6","children":["影视院线","广告营销","游戏","出版","广播电视","数字媒体","有线网络"]}];
var CSW2={"兆易创新":"半导体","生益科技":"电子元件","宁德时代":"电池","比亚迪":"乘用车","特斯拉":"乘用车","赛力斯":"乘用车","同仁堂":"中药","达仁堂":"中药","马应龙":"中药","浙江震元":"医药商业","宋城演艺":"旅游景区","上海机场":"机场","中信证券":"证券","云铝股份":"铝","埃斯顿":"自动化设备","新松机器人":"自动化设备","科沃斯":"小家电","石头科技":"小家电","英伟达":"芯片设计","高通":"芯片设计","AMD":"芯片设计","博通":"芯片设计","联发科":"芯片设计","华为海思":"芯片设计","韦尔股份":"芯片设计","Synopsys":"芯片设计","Cadence":"芯片设计","芯原股份":"芯片设计","创意电子":"芯片设计"};
var CL={"兆易创新":"603986.html","生益科技":"600183.html","宁德时代":"ningde.html","赛力斯":"601127.html","同仁堂":"600085.html","达仁堂":"600329.html","马应龙":"600993.html","浙江震元":"000705.html","宋城演艺":"300144.html","上海机场":"600009.html","中信证券":"600030.html","云铝股份":"000807.html","埃斯顿":"robot-encyclopedia.html","新松机器人":"robot-encyclopedia.html","科沃斯":"robot-encyclopedia.html","石头科技":"robot-encyclopedia.html"};
var IL={"电子":"chip-industry-encyclopedia.html","芯片设计":"chip-design-encyclopedia.html","汽车":"auto-industry-encyclopedia.html","自动化设备":"robot-encyclopedia.html"};
var chart = echarts.init(document.getElementById('c'));
var view = 'l1', curId = null;

function opt(data) {
  return {
    backgroundColor: 'transparent',
    tooltip: {
      show: true, trigger: 'item',
      backgroundColor: 'rgba(10,10,30,0.92)',
      borderColor: 'rgba(167,139,250,0.15)',
      borderWidth: 1, borderRadius: 8, padding: [8, 12],
      textStyle: {fontSize: 11, fontFamily: 'sans-serif'},
      formatter: function(p) {
        if (!p.data || p.dataType !== 'node') return '';
        var d = p.data;
        var lt = document.body.classList.contains('light');
        var c1 = lt ? '#333' : '#e2e8f0', c2 = lt ? '#666' : '#94a3b8', c3 = lt ? 'rgba(99,102,241,0.6)' : 'rgba(167,139,250,0.6)';
        var h = '<div style="font-size:13px;font-weight:700;color:' + c1 + '">' + (d._icon || '') + ' ' + d.name + '</div>';
        if (d._desc) h += '<div style="font-size:10px;color:' + c2 + ';margin-top:2px">' + d._desc + '</div>';
        if (d._cos && d._cos.length) {
          h += '<div style="font-size:9px;color:' + c3 + ';margin-top:4px">关联企业：</div>';
          d._cos.forEach(function(co) {
            var hl = CL[co] ? 'style="color:#34d399"' : '';
            h += '<div ' + hl + ' style="font-size:9px;padding:1px 0">' + (CL[co] ? '📄 ' : '· ') + co + '</div>';
          });
        }
        return h;
      }
    },
    series: [{
      type: 'graph', layout: 'force', roam: true,
      force: {repulsion: 300, edgeLength: [50, 150], gravity: 0.05},
      data: data.n, links: data.l,
      label: {show: true, fontSize: 9, color: '#94a3b8'},
      lineStyle: {color: 'rgba(255,255,255,0.1)', width: 0.5},
      emphasis: {focus: 'adjacency'},
      nodeClick: false,
    }]
  };
}

function l1() {
  view = 'l1'; curId = null;
  var n = [{name: '\uD83C\uDF0C \u4EA7\u4E1A\u661F\u56FE', symbolSize: 32, itemStyle: {color: '#a78bfa'}, id: 'h'}];
  var l = [];
  SW.forEach(function(d) {
    var sz = IL[d.name] ? 24 : 20;
    n.push({name: d.icon + ' ' + d.name, symbolSize: sz, itemStyle: {color: d.color || '#6366f1'}, id: d.id, _s: d});
    l.push({source: 'h', target: d.id});
  });
  chart.setOption(opt({n: n, l: l}));
  document.getElementById('bc').innerHTML = '<span class="cur">\uD83C\uDF0C \u5168\u884C\u4E1A</span>';
}

function l2(id) {
  view = 'l2'; curId = id;
  var s = SW.find(function(d) { return d.id === id; });
  if (!s) return;
  var hi = !!IL[s.name], n = [], l = [];
  n.push({name: s.icon + ' ' + s.name, symbolSize: 28, itemStyle: {color: s.color || '#a78bfa', shadowBlur: 15, shadowColor: (s.color || '#a78bfa') + '80'}, id: id, _is: true, _icon: s.icon});
  n.push({name: '\u2190', symbolSize: 12, itemStyle: {color: 'rgba(167,139,250,0.2)'}, id: 'b'});
  l.push({source: 'b', target: id});
  (s.children || []).forEach(function(c) {
    var cos = [];
    for (var k in CSW2) { if (CSW2[k] === c) cos.push(k); }
    var hasCos = cos.length > 0;
    var il = IL[c];
    var sz = hasCos ? 16 : (il ? 14 : 11);
    var clr = il ? '#22d3ee' : (hasCos ? '#34d399' : s.color || '#6366f1');
    var op = hasCos || il ? 1 : 0.35;
    var mark = il ? ' \uD83D\uDD2C' : (hasCos ? ' \uD83D\uDCC4' : '');
    n.push({name: c + mark, symbolSize: sz, itemStyle: {color: clr, opacity: op}, id: 's-' + c, _cos: cos, _icon: '\uD83D\uDCC2', _desc: hasCos ? cos.length + '家关联企业' : (il ? '有行业研究' : ''), _s2: c, _il: il});
    l.push({source: id, target: 's-' + c});
  });
  chart.setOption(opt({n: n, l: l}));
  document.getElementById('bc').innerHTML = '<span onclick="l1()" style="cursor:pointer">\uD83C\uDF0C</span><span style="color:rgba(148,163,184,0.15)"> \u203A </span><span class="cur">' + s.icon + ' ' + s.name + '</span>';
}

chart.on('click', function(params) {
  if (!params.data || params.dataType !== 'node') { if (view === 'l2') l1(); return; }
  var d = params.data;
  if (d.id === 'b') { l1(); return; }
  if (view === 'l1' && d._s) { l2(d._s.id); return; }
  if (d._is) {
    var sw = SW.find(function(x) { return x.id === d.id; });
    if (sw && IL[sw.name]) window.open(IL[sw.name], '_blank');
    return;
  }
  // Secondary industry click
  if (d._il) { window.open(d._il, '_blank'); return; }
  if (d._cos && d._cos.length) {
    // Show company list in tooltip - already handled by formatter
    // Optionally could open a popup here
  }
});

function srch(v) {
  var q = v.trim().toLowerCase();
  if (!q) {
    var o = document.getElementById('sr');
    if (o) o.remove();
    return;
  }
  var r = [];
  SW.forEach(function(d) {
    if (d.name.toLowerCase().includes(q)) r.push({t: d.icon + ' ' + d.name, a: function() { l2(d.id); }});
    (d.children || []).forEach(function(c) {
      if (c.toLowerCase().includes(q)) r.push({t: '\uD83D\uDCC1 ' + c, a: function() { l2(d.id); }});
    });
  });
  for (var k in CSW2) {
    if (k.toLowerCase().includes(q) && CL[k]) {
      (function(kk) {
        r.push({t: '\uD83C\uDFE2 ' + kk, a: function() { window.open(CL[kk], '_blank'); }});
      })(k);
    }
  }
  if (!r.length) return;
  r = r.filter(function(i, x, a) { return a.findIndex(function(j) { return j.t === i.t; }) === x; }).slice(0, 8);
  var e = document.createElement('div');
  e.id = 'sr';
  e.style.cssText = 'position:fixed;top:34px;right:10px;z-index:99;background:rgba(10,10,30,0.95);border:1px solid rgba(167,139,250,0.1);border-radius:6px;padding:4px;max-height:180px;overflow-y:auto;min-width:120px';
  e.innerHTML = r.map(function(i) {
    return '<div class="sr-item" onclick="var s=document.getElementById(\'sr\');if(s)s.remove();document.getElementById(\'in\').value=\'\';(' + i.a.toString() + ')()">' + i.t + '</div>';
  }).join('');
  var old = document.getElementById('sr');
  if (old) old.remove();
  document.body.appendChild(e);
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#in') && !e.target.closest('#sr')) {
    var o = document.getElementById('sr');
    if (o) o.remove();
  }
});

function applyTheme(t) { document.body.classList.toggle('light', t === 'light'); }

(function() {
  var t = localStorage.getItem('portal_theme');
  if (t === 'light') applyTheme('light');
  window.addEventListener('message', function(e) {
    if (e.data && typeof e.data.theme === 'string') applyTheme(e.data.theme);
    if (e.data && e.data.backToIndustrySelect) goBack();
  });
})();

function goBack() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({backToIndustrySelect: true}, '*');
  } else {
    window.location.href = 'index.html';
  }
}

l1();
window.addEventListener('resize', function() { chart.resize(); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { if (view === 'l2') l1(); else goBack(); }
});
setTimeout(function() { var h = document.getElementById('hint'); if (h) h.style.opacity = '0'; }, 5000);
console.log('Starmap v3 loaded');
</script>
</body>
</html>
