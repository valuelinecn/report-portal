body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;

#bar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;padding:6px 10px;background:rgba(6,6,26,0.85);backdrop-filter:blur(12px);gap:6px;font-size:11px}
#bar button{background:transparent;border:1px solid rgba(167,139,250,0.1);border-radius:6px;padding:3px 8px;color:rgba(167,139,250,0.5);font-size:10px;cursor:pointer}
#bar button:hover{border-color:rgba(167,139,250,0.3);color:#a78bfa}
#bc{flex:1;display:flex;gap:3px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;font-size:10px;align-items:center}
#bc span{cursor:pointer;padding:1px 4px;border-radius:3px;color:rgba(148,163,184,0.4)}
#bc span:hover{color:#a78bfa}
#bc .cur{color:rgba(167,139,250,0.6);font-weight:600}
#in{padding:2px 6px;border-radius:4px;border:1px solid rgba(167,139,250,0.1);background:rgba(167,139,250,0.04);color:#94a3b8;font-size:10px;width:80px;outline:none}
#in:focus{border-color:rgba(167,139,250,0.25);width:120px;color:#e2e8f0}
#hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;font-size:9px;color:rgba(148,163,184,0.15);pointer-events:none;transition:opacity .8s}
#l1{position:fixed;top:34px;bottom:0;left:0;right:0;z-index:1;overflow-y:auto;padding:10px 10px 40px}
#l1 .t{font-size:10px;color:rgba(148,163,184,0.3);text-align:center;padding:4px 0 8px;letter-spacing:1px}
.l1-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.l1-i{background:rgba(15,23,42,0.5);border:1px solid rgba(148,163,184,0.06);border-radius:10px;padding:8px 6px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3;backdrop-filter:blur(4px)}
.l1-i:active{transform:scale(0.95)}
.l1-i .ic{font-size:16px}
.l1-i .nm{font-size:8px;color:#94a3b8;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.l1-i .ct{font-size:7px;color:rgba(148,163,184,0.3);margin-top:1px}
#l2{position:fixed;top:34px;bottom:0;left:0;right:0;z-index:1;display:none}
#c{width:100%;height:100%}
.sr-item{padding:3px 8px;cursor:pointer;font-size:10px;color:#94a3b8;border-radius:4px}
.sr-item:hover{background:rgba(167,139,250,0.12);color:#e2e8f0}
body.light{background:#f4f1ea}
body.light #bar{background:rgba(244,241,234,0.85)}
body.light #in{color:#505050}
body.light .l1-i{background:rgba(255,255,255,0.6);border-color:rgba(99,102,241,0.06)}
body.light .l1-i .nm{color:#666}
body.light .l1-i .ct{color:rgba(80,80,80,0.3)}
body.light #hint{color:rgba(80,80,80,0.1)}
body.light::before,body.light::after{opacity:0.4}
@media(min-width:500px){.l1-g{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}}

function showL1(){
  document.getElementById('l1').style.display='block';document.getElementById('l2').style.display='none';
  document.getElementById('bc').innerHTML='<span class="cur">🌌 全行业</span>';
  var h='<div class="t">申万行业分类 · 31一级 → 134二级 → 346三级</div><div class="l1-g">';
  SW.forEach(function(d){
    var cnt=0;(d.children||[]).forEach(function(s){cnt+=(s.children||[]).length;});
    h+='<div class="l1-i" data-swid="'+d.id+'" style="border-left:2px solid '+(d.color||'#6366f1')+'">'+
      '<div class="ic">'+d.icon+'</div><div class="nm">'+d.name+'</div><div class="ct">'+cnt+'个三级</div></div>';
  });
  document.getElementById('l1').innerHTML=h+'</div>';
  // Event delegation for grid clicks
  document.getElementById('l1').onclick=function(e){
    var el=e.target.closest('.l1-i');
    if(el&&el.dataset.swid)showL2(el.dataset.swid);
  };
}

var chart=echarts.init(document.getElementById('c')),curSw1=null;
function showL2(id){
  var s=SW.find(function(d){return d.id===id});if(!s)return;
  curSw1=id;document.getElementById('l1').style.display='none';document.getElementById('l2').style.display='block';
  document.getElementById('bc').innerHTML='<span onclick="showL1()" style="cursor:pointer">🌌</span><span style="color:rgba(148,163,184,0.15)"> › </span><span class="cur">'+s.icon+' '+s.name+'</span>';
  var n=[],l=[];
  // Back button
  n.push({name:'← 返回',symbolSize:12,itemStyle:{color:'rgba(167,139,250,0.2)'},id:'b'});
  l.push({source:'b',target:'hub-'+id});
  // Hub
  n.push({name:s.icon+' '+s.name,symbolSize:22,itemStyle:{color:s.color||'#a78bfa',shadowBlur:10,shadowColor:(s.color||'#a78bfa')+'60'},id:'hub-'+id});
  (s.children||[]).forEach(function(c){
    var tid='s2-'+c.name;
    n.push({name:c.name,symbolSize:12,itemStyle:{color:s.color||'#6366f1'},id:tid});
    l.push({source:'hub-'+id,target:tid});
    (c.children||[]).forEach(function(t){
      var has=!!RS[t];
      n.push({name:t,symbolSize:has?8:5,itemStyle:{color:has?'#34d399':'rgba(148,163,184,0.25)'},id:'t3-'+t,_t3:t,_has:has});
      l.push({source:tid,target:'t3-'+t});
    });
  });
  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{show:true,trigger:'item',backgroundColor:'rgba(10,10,30,0.92)',borderColor:'rgba(167,139,250,0.15)',borderWidth:1,borderRadius:8,padding:[8,12],
      formatter:function(p){
        if(!p.data||p.dataType!=='node')return'';
        var d=p.data;var lt=document.body.classList.contains('light');
        var h='<div style="font-size:11px;font-weight:700;color:'+(lt?'#333':'#e2e8f0')+'">'+d.name+'</div>';
        if(d._t3)h+='<div style="font-size:9px;color:'+(lt?'#666':'#94a3b8')+';margin-top:2px">'+(d._has?'📄 已有研究 点击查看':'🔬 待研究')+'</div>';
        return h;
      }
    },
    series:[{
      type:'graph',layout:'force',roam:true,
      force:{repulsion:200,edgeLength:[30,120],gravity:0.08,friction:0.2,layoutAnimation:true},
      data:n,links:l,
      label:{show:true,fontSize:7.5,color:'#94a3b8'},
      lineStyle:{color:'rgba(255,255,255,0.08)',width:0.3},
      emphasis:{focus:'adjacency',scale:1.2,lineStyle:{width:1.5,opacity:0.4}},
      nodeClick:false,
    }]
  });
  setTimeout(function(){chart.resize()},50);
}

chart.on('click',function(p){
  if(!p.data||p.dataType!=='node')return;
  var d=p.data;
  if(d.id==='b'){showL1();return;}
  if(d._t3&&d._has){var lk=RS[d._t3];if(lk)window.open(lk,'_blank');}
});

function srch(v){
  var q=v.trim().toLowerCase();if(!q){var o=document.getElementById('sr');if(o)o.remove();return;}
  var r=[];
  SW.forEach(function(d){
    if(d.name.toLowerCase().includes(q))r.push({t:d.icon+' '+d.name,a:function(){showL2(d.id);}});
    (d.children||[]).forEach(function(c){
      if(c.name.toLowerCase().includes(q))r.push({t:'📁 '+c.name,a:function(){showL2(d.id);}});
      (c.children||[]).forEach(function(t){if(t.toLowerCase().includes(q))r.push({t:'📂 '+t,a:function(){showL2(d.id);}});});
    });
  });
  if(!r.length)return;
  r=r.filter(function(i,x,a){return a.findIndex(function(j){return j.t===i.t})===x;}).slice(0,8);
  var e=document.createElement('div');e.id='sr';
  e.style.cssText='position:fixed;top:34px;right:10px;z-index:99;background:rgba(10,10,30,0.95);border:1px solid rgba(167,139,250,0.1);border-radius:6px;padding:4px;max-height:180px;overflow-y:auto;min-width:130px';
  e.innerHTML=r.map(function(i){return'<div class="sr-item" onclick="var s=document.getElementById(\'sr\');if(s)s.remove();document.getElementById(\'in\').value=\'\';('+i.a.toString()+')()">'+i.t+'</div>';}).join('');
  var old=document.getElementById('sr');if(old)old.remove();document.body.appendChild(e);
}
document.addEventListener('click',function(e){if(!e.target.closest('#in')&&!e.target.closest('#sr')){var o=document.getElementById('sr');if(o)o.remove();}});
