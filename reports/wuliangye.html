var current = 'daily';
var chart = null;

function render(p) {
  if (chart) { chart.dispose(); chart = null; }
  var data = ALL_DATA[p];
  if (!data || data.length === 0) return;
  var el = document.getElementById('chart');
  if (!el) return;
  chart = echarts.init(el);
  var dates = data.map(function(d) { return d.time; });
  var values = data.map(function(d) { return d.value; });
  chart.setOption({
    xAxis: { type:'category', data:dates, axisLabel:{color:'#888',fontSize:10,formatter:function(v){return p==='yearly'?v.substring(0,4):v.substring(5);}} },
    yAxis: { type:'value', axisLabel:{color:'#888',fontSize:10,formatter:function(v){return (v/100).toFixed(0)+'亿';}} },
    series: [{ type:'line', data:values, smooth:true, symbol:'none', lineStyle:{color:'#f0c040',width:2} }],
    dataZoom: [{ type:'inside' }],
    tooltip: { trigger:'axis' }
  });
}

document.getElementById('tabs').addEventListener('click', function(e) {
  var b = e.target.closest('.tab');
  if (!b || b.dataset.p === current) return;
  current = b.dataset.p;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('active', x.dataset.p === current);});
  render(current);
});

render('daily');
